services:
  mongodb:
    image: mongo:7
    container_name: jobportal-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: jobportal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: jobportal-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      FRONTEND_URL: http://localhost:5173
      DB_URL: mongodb://mongodb:27017/jobportal
      DB_NAME: Job_Portal
      JWT_SECRET_KEY: local-docker-development-secret
      ACCESS_TOKEN_EXPIRE: 15m
      ACCESS_TOKEN_COOKIE_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      COOKIE_EXPIRE: 7
      COOKIE_SAME_SITE: lax
      COOKIE_SECURE: "false"
      ENABLE_CSRF: "false"
      ADZUNA_COUNTRY: in
      GEMINI_MODEL: gemini-2.5-flash
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api/v1
    container_name: jobportal-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongodb_data:
  redis_data:
